        <polygon points="70,46 102,46 82,100 50,100"/>
        <polygon points="126,46 158,46 138,100 106,100"/>
        <polygon points="182,46 214,46 194,100 162,100"/>
        <polygon points="238,46 270,46 250,100 218,100"/>
        <polygon points="294,46 326,46 306,100 274,100"/>
      </g>
    </g>
    <!-- play triangle -->
    <path d="M128 150 L228 200 L128 250 Z" fill="url(#accent)"/>
  </g>
</svg>
